name: Quality Agent

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-agent:
    name: Quality Agent
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.lock
          # Optional security tools — install if not in lock file
          pip install bandit pip-audit 2>/dev/null || true

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Quality Agent
        run: python scripts/run_quality_agent.py --root . --config quality/config.yaml --output-dir reports
        env:
          PYTHONPATH: "."

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_number }}
          path: |
            reports/quality_report.json
            reports/quality_report.md
          retention-days: 30

      - name: Publish SARIF (bandit)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/bandit.sarif
        continue-on-error: true  # only present if bandit produced SARIF output

  docs-lint:
    name: Docs Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run docs linter
        run: python scripts/lint_docs.py --root docs --index docs/index.md
        env:
          PYTHONPATH: "."
