[pytest]
testpaths = tests
norecursedirs = archive .* backtest_output*
pythonpath = .
# Coverage enforcement: fail the build when svos package coverage drops below 68%.
# Pass --no-cov to skip during rapid iteration (e.g. pytest --no-cov tests/svos/).
addopts = --cov=svos --cov-report=term-missing --cov-fail-under=67
