name: Bug report
description: Report a bug, issue, or defect in the repository.
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please provide information that helps reproduce the problem and verify the fix."
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Brief description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, branch, workflow or command used.
