# Strategy Portfolio Configuration
# risk: percentage of account per trade (e.g. 0.30 = 0.30%)
# mode: demo  → signal → OrderManager → VantageDemoExecutor → MT5
#       shadow → signal → ShadowTracker → logs/shadow_trades.jsonl (no orders)

portfolio:
  max_trades_per_day:     6
  max_open_positions:     3
  daily_loss_limit_pct:   2.0      # % of account
  min_confidence:         0.6      # signals below this are discarded

pairs:
  - EURUSD
  - GBPUSD
  - USDJPY                         # LondonBreakout + NYMomentum only

correlation_groups:
  # Signals in the same group + same direction = only highest-confidence passes
  - [EURUSD, GBPUSD]

strategies:
  ST-A2:
    enabled:        true
    mode:           demo
    risk:           0.30            # validated tier-1: 0.30% per trade
    pairs:          [EURUSD, GBPUSD]
    min_confidence: 0.7
    description:    "Session sweep + 15M CHoCH + BOS + FVG — core validated strategy"

  LondonBreakout:
    enabled:        true
    mode:           demo
    risk:           0.20            # conditionally validated tier-2: 0.20% per trade
    pairs:          [EURUSD, GBPUSD, USDJPY]
    min_confidence: 0.6
    description:    "Asian range breakout + London retest"

  NYMomentum:
    enabled:        true
    mode:           demo
    risk:           0.20            # conditionally validated tier-2: 0.20% per trade
    pairs:          [EURUSD, GBPUSD, USDJPY]
    min_confidence: 0.6
    description:    "NY sweep of London H/L + retest"

  AdaptiveSMC:
    enabled:        true
    mode:           shadow          # observe only — no orders placed
    risk:           0.10            # unvalidated tier-3: tracked in shadow journal
    pairs:          [EURUSD, GBPUSD]
    min_confidence: 0.8
    description:    "Adaptive SMC with regime + score gate — shadow observation"

  VWAPBreakout:
    enabled:        true
    mode:           shadow          # observe only — no orders placed
    risk:           0.10            # unvalidated tier-3: tracked in shadow journal
    pairs:          [EURUSD, GBPUSD]
    min_confidence: 0.65
    description:    "Session VWAP cross with volume confirmation — shadow observation"
