# ── Architecture constants ─────────────────────────────────────────────────────
architecture:
  pattern: modular_monolith
  language: python3.12
  lifecycle_authority: svos/lifecycle/manager.py       # only authority for stage changes
  persistence_live: JSONL                              # data/svos/ — NEVER WRITTEN
  persistence_target: PostgreSQL                       # vmassit db, localhost:5432
  persistence_readonly: YAML                           # config/strategy_catalog.yaml
  artifact_store: SHA-256 content-addressed filesystem # svos/adapters/artifacts.py
  postgres_wired: false                                # built in db/; not called in production

# ── Hard rules (never violate) ────────────────────────────────────────────────
rules:
  - Never hardcode strategy name — always use registry lookup keyed by strategy_id
  - Never bypass governance — svos/lifecycle/manager.py is the only mutation authority
  - Never write YAML for lifecycle state — catalog is read-only projection
  - Never enable live trading — LIVE_TRADING=false and DEMO_ONLY=true are platform invariants
  - Never run backtest without pre-registering a trial ID in docs/VERDICT_LOG.md
  - Backtest must apply spread + commission; net-of-fees only; must pass 2x spread stress
  - Virtual Demo is offline only — no broker, no network
  - Do not start new feature work while feature_freeze is true
  - Minimize total token usage — stay concise, read only needed files, and avoid duplicate work

# ── Phase gates ───────────────────────────────────────────────────────────────
phase_gates:
  statistical_validation: "n >= 50 AND net_pf > 1.0 at standard AND 2x spread stress"

