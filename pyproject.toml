[tool.ruff]
target-version = "py312"
line-length = 140
exclude = [
  "archive",
  "data",
  "logs",
  "reports",
  "research_db",
  "research_sweep",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.mypy]
python_version = "3.12"
files = ["svos/lifecycle", "svos/shared"]
exclude = "^(archive|data|logs|reports|research_db|research_sweep)/"
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = true
show_error_codes = true
