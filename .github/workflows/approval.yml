name: Production Approval Gate

on:
  workflow_run:
    workflows: ["Testing Agent", "Quality Agent"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: approval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  approval-gate:
    name: Production Approval Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install bandit pip-audit 2>/dev/null || true

      - name: Create reports directory
        run: mkdir -p reports

      - name: Testing Agent
        run: python scripts/run_testing_agent.py --root . --config config/testing.yaml --output-dir reports
        env:
          PYTHONPATH: "."

      - name: Quality Agent
        run: python scripts/run_quality_agent.py --root . --config quality/config.yaml --output-dir reports
        env:
          PYTHONPATH: "."

      - name: Production Approval Agent
        run: python scripts/run_approval_agent.py --root . --output-dir reports
        env:
          PYTHONPATH: "."

      - name: Upload all reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-reports-${{ github.run_number }}
          path: |
            reports/testing_report.json
            reports/testing_report.md
            reports/quality_report.json
            reports/quality_report.md
            reports/approval_report.json
            reports/production_readiness_report.json
            reports/production_readiness_report.md
          retention-days: 90

      - name: Print production readiness decision
        if: always()
        run: cat reports/production_readiness_report.md || true

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Governance Test Results
          path: reports/unit-test-results.xml
          reporter: java-junit
        continue-on-error: true
