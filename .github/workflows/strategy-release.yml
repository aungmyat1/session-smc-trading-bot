name: Strategy Release

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: Approved strategy catalog name
        required: true
      version:
        description: Approved strategy semantic version
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: strategy-release-${{ inputs.strategy }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build signed strategy release
    runs-on: ubuntu-latest
    environment: strategy-release
    steps:
      - name: Validate release environment configuration
        run: |
          missing=()
          [ -z "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${{ vars.GCP_RELEASE_SERVICE_ACCOUNT }}" ] && missing+=("GCP_RELEASE_SERVICE_ACCOUNT")
          [ -z "${{ vars.SVOS_KMS_KEY_VERSION }}" ] && missing+=("SVOS_KMS_KEY_VERSION")
          [ -z "${{ vars.SVOS_GCS_BUCKET }}" ] && missing+=("SVOS_GCS_BUCKET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required strategy-release environment variables: ${missing[*]}"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --require-hashes -r requirements.lock
      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_RELEASE_SERVICE_ACCOUNT }}
      - name: Build and verify approved package
        env:
          STRATEGY: ${{ inputs.strategy }}
          VERSION: ${{ inputs.version }}
          SVOS_PACKAGE_SIGNING_MODE: gcp-kms-asymmetric
          SVOS_CLOUD_ADAPTER: real
          SVOS_KMS_KEY_VERSION: ${{ vars.SVOS_KMS_KEY_VERSION }}
          SVOS_PACKAGE_TRANSPORT: gcs
          SVOS_GCS_BUCKET: ${{ vars.SVOS_GCS_BUCKET }}
        run: python scripts/build_strategy_release.py --strategy "$STRATEGY" --version "$VERSION" --output dist/release
      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          STRATEGY: ${{ inputs.strategy }}
          VERSION: ${{ inputs.version }}
        run: >-
          gh release create "strategy/$STRATEGY/v$VERSION"
          dist/release/*
          --generate-notes
          --target '${{ github.sha }}'
          --title "$STRATEGY v$VERSION"
