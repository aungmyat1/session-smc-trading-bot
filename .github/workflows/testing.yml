name: Testing Agent

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testing-agent:
    name: Testing Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.lock

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Testing Agent
        run: python scripts/run_testing_agent.py --root . --config config/testing.yaml --output-dir reports
        env:
          PYTHONPATH: "."

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testing-reports-${{ github.run_number }}
          path: |
            reports/testing_report.json
            reports/testing_report.md
            reports/unit-test-results.xml
            reports/unit-coverage.json
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: reports/unit-test-results.xml
          reporter: java-junit
        continue-on-error: true  # reporter is optional — don't fail the gate
