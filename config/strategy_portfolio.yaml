# Strategy Portfolio Configuration
# execution_mode: demo = live demo orders | shadow = signal-only, no order
# Risk tiers: tier1=0.30%, tier2=0.20%, tier3=0.10%

portfolio:
  max_trades_per_day:      6        # London ~3 + NY ~3 on active days
  max_open_positions:      3
  daily_loss_limit_pct:    2.0
  weekly_loss_limit_pct:   5.0
  monthly_loss_limit_pct:  8.0
  min_confidence:          0.60

correlation_groups:
  - [EURUSD, GBPUSD, EURGBP]       # EUR group
  - [GBPUSD, GBPJPY, EURGBP]       # GBP group
  - [USDJPY, EURJPY, GBPJPY]       # JPY group

strategies:

  ST-A2:
    enabled:        true
    execution_mode: demo            # tier1 — backtest validated
    risk:           0.30
    pairs:          [EURUSD, GBPUSD]
    min_confidence: 0.70
    description:    "Session sweep + 15M CHoCH + BOS + FVG entry"

  LondonBreakout:
    enabled:        true
    execution_mode: demo            # tier2 — adaptive engine, demo phase
    risk:           0.20
    pairs:          [EURUSD, GBPUSD, USDJPY]
    min_confidence: 0.60
    description:    "Asian range breakout + London retest"

  NYMomentum:
    enabled:        true
    execution_mode: demo            # tier2 — adaptive engine, demo phase
    risk:           0.20
    pairs:          [EURUSD, GBPUSD, USDJPY]
    min_confidence: 0.60
    description:    "NY sweep of London H/L + retest"

  AdaptiveSMC:
    enabled:        true
    execution_mode: shadow          # tier3 — observe only until validated
    risk:           0.10
    pairs:          [EURUSD, GBPUSD]
    min_confidence: 0.80
    description:    "Adaptive SMC session strategy (shadow)"

  VWAPBreakout:
    enabled:        true
    execution_mode: shadow          # tier3 — observe only until validated
    risk:           0.10
    pairs:          [EURUSD, GBPUSD]
    min_confidence: 0.70
    description:    "VWAP cross + volume confirmation (shadow)"
