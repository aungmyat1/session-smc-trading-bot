# Portfolio Demo — Safety Configuration
# Phase: Multi-strategy demo validation
# Runner: scripts/run_portfolio.py
# DO NOT use for live trading.

execution:
  mode: demo                    # shadow | demo | live (live = blocked by CLAUDE.md §0)
  broker: vantage_mt5
  account_type: demo
  demo_only: true               # redundant guard — DEMO_ONLY env var must also be false
  magic_number: 21099
  order_comment: "portfolio-demo"

trading:
  allowed_pairs:
    - EURUSD
    - GBPUSD
    - USDJPY
  # XAUUSD: ST-A2 only on shadow until XAUUSD-specific backtest passes
  scan_interval_seconds: 60
  max_spread_pips:
    EURUSD: 1.5
    GBPUSD: 2.0
    USDJPY: 1.5                 # pips (0.01 per pip for JPY pairs)

risk:
  max_trades_per_day: 6         # 3 London + 3 NY slots across all strategies
  max_open_positions: 3         # up to 3 uncorrelated positions simultaneously
  daily_loss_limit_pct: 2.0
  weekly_loss_limit_pct: 5.0
  monthly_loss_limit_pct: 8.0
  max_consecutive_losses: 4
  max_lot_size: 0.5

disabled_behaviors:
  unlimited_retries: true
  aggressive_recovery: true
  martingale: true
  averaging_down: true
  auto_live_enable: true

circuit_breaker:
  max_signals_per_hour: 6       # portfolio-level rate limit (all strategies combined)
  consecutive_loss_cooldown_hours: 4

logging:
  trade_journal_db: data/trade_journal.db
  shadow_journal: logs/shadow_trades.jsonl
  demo_journal: logs/portfolio_demo_trades.jsonl
  runner_log: logs/portfolio_runner.log
  demo_log: logs/portfolio_demo.log
