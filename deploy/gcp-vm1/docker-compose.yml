services:
  postgres:
    image: postgres:16-alpine
    container_name: quant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_research}
      POSTGRES_USER: ${POSTGRES_USER:-trading_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - quant_pgdata:/var/lib/postgresql/data
      - ../../db/schema_v2.sql:/docker-entrypoint-initdb.d/01_schema_v2.sql:ro
      - ../../db/schema_v3.sql:/docker-entrypoint-initdb.d/02_schema_v3.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_user} -d ${POSTGRES_DB:-trading_research}"]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "max_connections=100"

  adminer:
    image: adminer:4
    container_name: quant-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  quant_pgdata:
